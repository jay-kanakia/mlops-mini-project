  name: CI Pipeline

  on: push

  jobs:
    project-testing:
      runs-on: ubuntu-latest

      steps:
        - name: checkout code
          uses: actions/checkout@v3

        - name: setup python
          uses: actions/setup-python@v2
          with:
            python-version: '3.10'

        - name: Cache pip dependencies
          uses: actions/cache@v3
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
            restore-keys: |
              ${{ runner.os }}-pip-

        - name: install dependencies
          run: |
            pip install -r requirements.txt

        - name: Debug Secret
          run: |
            if [ -z "${{ secrets.DAGSHUB_PAT }}" ]; then
              echo "SECRET_STATUS: Secret is EMPTY"
            else
              echo "SECRET_STATUS: Secret exists"
              # This counts the characters. A real token should be around 40.
              echo "SECRET_LENGTH: ${#TOKEN}" 
            fi
          env:
            TOKEN: ${{ secrets.DAGSHUB_PAT }}

        - name: run pipeline
          env:
            DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }} 
            MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_PAT }} 
            MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_PAT }}
          run: |
            dvc repro